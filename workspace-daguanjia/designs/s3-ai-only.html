<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>S3 AI 智能分析</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: #1a1a2e; padding: 40px; display: flex; justify-content: center; }
        .phone { width: 375px; height: 812px; background: #f8f9fc; border-radius: 44px; box-shadow: 0 25px 80px rgba(0,0,0,0.3); overflow: hidden; border: 14px solid #1a1a2e; }
        .phone::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 140px; height: 32px; background: #1a1a2e; border-radius: 0 0 24px 24px; }
        .header { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); color: white; padding: 55px 20px 20px; text-align: center; }
        .header h2 { font-size: 20px; font-weight: 600; }
        .header p { font-size: 13px; opacity: 0.9; margin-top: 6px; }
        .back-btn { position: absolute; left: 20px; top: 65px; width: 36px; height: 36px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; color: white; }
        .progress { display: flex; justify-content: space-between; padding: 20px 16px; background: #fff; }
        .step { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .step-dot { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
        .step-dot.completed { background: #10b981; color: white; }
        .step-dot.active { background: #1e40af; color: white; }
        .step-dot { background: #e5e7eb; color: #9ca3af; }
        .step-label { font-size: 10px; color: #9ca3af; }
        .step.active .step-label, .step.completed .step-label { color: #1e40af; font-weight: 500; }
        .content { padding: 20px 16px; }
        .alert { background: #fef3c7; border-left: 4px solid #f59e0b; border-radius: 10px; padding: 14px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
        .alert-icon { font-size: 24px; }
        .alert-text { flex: 1; font-size: 13px; color: #78350f; }
        .ai-result { background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
        .ai-badge { display: inline-block; background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); color: white; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 12px; }
        .analysis-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .analysis-item { background: #fff; border-radius: 12px; padding: 14px; text-align: center; }
        .analysis-label { font-size: 11px; color: #6b7280; margin-bottom: 6px; }
        .analysis-value { font-size: 18px; font-weight: 700; color: #1e40af; }
        .card { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
        .severity-selector { display: flex; gap: 8px; margin-bottom: 16px; }
        .severity-option { flex: 1; padding: 12px; border-radius: 10px; text-align: center; border: 2px solid #e5e7eb; }
        .severity-option.medium { background: #fef3c7; border-color: #f59e0b; }
        .severity-name { font-size: 14px; font-weight: 600; }
        .severity-desc { font-size: 11px; color: #6b7280; margin-top: 4px; }
        .edit-row { display: flex; gap: 12px; margin-bottom: 12px; }
        .edit-input { flex: 1; padding: 12px; border: 1px solid #e5e7eb; border-radius: 10px; font-size: 15px; text-align: center; }
        .bottom-area { padding: 16px; background: #fff; border-top: 1px solid #e5e7eb; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 14px; font-size: 16px; font-weight: 600; margin-bottom: 12px; }
        .btn-primary { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); color: white; }
        .btn-secondary { background: #f3f4f6; color: #374151; }
    </style>
</head>
<body>
    <div class="phone">
        <div class="header">
            <div class="back-btn">←</div>
            <h2>AI 智能分析</h2>
            <p>分析完成，请确认结果</p>
        </div>
        <div class="progress">
            <div class="step completed"><div class="step-dot">✓</div><div class="step-label">位置</div></div>
            <div class="step completed"><div class="step-dot">✓</div><div class="step-label">上传</div></div>
            <div class="step active"><div class="step-dot">3</div><div class="step-label">分析</div></div>
            <div class="step"><div class="step-dot">4</div><div class="step-label">方案</div></div>
            <div class="step"><div class="step-dot">5</div><div class="step-label">价格</div></div>
            <div class="step"><div class="step-dot">6</div><div class="step-label">下单</div></div>
        </div>
        <div class="content">
            <div class="alert">
                <div class="alert-icon">⚠️</div>
                <div class="alert-text">AI 置信度 65%，建议手动修正</div>
            </div>
            <div class="ai-result">
                <div class="ai-badge">✨ AI 分析结果</div>
                <div class="analysis-grid">
                    <div class="analysis-item">
                        <div class="analysis-label">估算面积</div>
                        <div class="analysis-value">8.5㎡</div>
                    </div>
                    <div class="analysis-item">
                        <div class="analysis-label">病害类型</div>
                        <div class="analysis-value" style="font-size:14px">防水层破损</div>
                    </div>
                    <div class="analysis-item">
                        <div class="analysis-label">严重程度</div>
                        <div class="analysis-value" style="color:#f59e0b">中等</div>
                    </div>
                    <div class="analysis-item">
                        <div class="analysis-label">置信度</div>
                        <div class="analysis-value">65%</div>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-title">✏️ 手动修正</div>
                <div class="edit-row">
                    <input class="edit-input" value="3.5" placeholder="长度 (m)">
                    <input class="edit-input" value="2.4" placeholder="宽度 (m)">
                </div>
                <div style="font-size:12px;color:#6b7280;margin-bottom:8px">严重程度</div>
                <div class="severity-selector">
                    <div class="severity-option"><div class="severity-name">🟢 轻微</div><div class="severity-desc">表面渗水</div></div>
                    <div class="severity-option medium"><div class="severity-name">🟡 中等</div><div class="severity-desc">明显漏水</div></div>
                    <div class="severity-option"><div class="severity-name">🔴 严重</div><div class="severity-desc">大量渗漏</div></div>
                </div>
            </div>
        </div>
        <div class="bottom-area">
            <button class="btn btn-secondary">上一步</button>
            <button class="btn btn-primary">确认并查看方案</button>
        </div>
    </div>
</body>
</html>
