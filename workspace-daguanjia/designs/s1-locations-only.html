<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S1 选择漏点位置</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #1a1a2e;
            padding: 40px;
            display: flex;
            justify-content: center;
        }
        .phone {
            width: 375px;
            height: 812px;
            background: #f8f9fc;
            border-radius: 44px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.3);
            overflow: hidden;
            border: 14px solid #1a1a2e;
            position: relative;
        }
        .phone::before {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 140px; height: 32px;
            background: #1a1a2e;
            border-radius: 0 0 24px 24px;
        }
        .header {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            color: white;
            padding: 55px 20px 20px;
        }
        .header h2 { font-size: 20px; font-weight: 600; text-align: center; }
        .header p { font-size: 13px; opacity: 0.9; text-align: center; margin-top: 6px; }
        .back-btn {
            position: absolute; left: 20px; top: 65px;
            width: 36px; height: 36px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .progress {
            display: flex; justify-content: space-between;
            padding: 20px 16px; background: #fff;
        }
        .step { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .step-dot {
            width: 26px; height: 26px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 600;
        }
        .step-dot.active { background: #1e40af; color: white; }
        .step-dot { background: #e5e7eb; color: #9ca3af; }
        .step-label { font-size: 10px; color: #9ca3af; margin-top: 6px; }
        .step.active .step-label { color: #1e40af; font-weight: 500; }
        .content { padding: 20px 16px; }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
        .location-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .location-item {
            background: #fff;
            border: 2px solid #e5e7eb;
            border-radius: 14px;
            padding: 16px 8px;
            text-align: center;
        }
        .location-item.selected {
            border-color: #1e40af;
            background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
        }
        .location-icon { font-size: 32px; margin-bottom: 8px; }
        .location-name { font-size: 13px; font-weight: 500; color: #374151; }
        .location-example { font-size: 11px; color: #9ca3af; margin-top: 4px; }
        .bottom-area {
            padding: 16px;
            background: #fff;
            border-top: 1px solid #e5e7eb;
        }
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="phone">
        <div class="header">
            <div class="back-btn">←</div>
            <h2>选择漏点位置</h2>
            <p>请选择需要防水补漏的区域</p>
        </div>
        <div class="progress">
            <div class="step active"><div class="step-dot">1</div><div class="step-label">位置</div></div>
            <div class="step"><div class="step-dot">2</div><div class="step-label">上传</div></div>
            <div class="step"><div class="step-dot">3</div><div class="step-label">分析</div></div>
            <div class="step"><div class="step-dot">4</div><div class="step-label">方案</div></div>
            <div class="step"><div class="step-dot">5</div><div class="step-label">价格</div></div>
            <div class="step"><div class="step-dot">6</div><div class="step-label">下单</div></div>
        </div>
        <div class="content">
            <div class="card">
                <div class="card-title">📍 漏点位置</div>
                <div class="location-grid">
                    <div class="location-item selected">
                        <div class="location-icon">🚿</div>
                        <div class="location-name">卫生间</div>
                        <div class="location-example">淋浴区/马桶</div>
                    </div>
                    <div class="location-item">
                        <div class="location-icon">🍳</div>
                        <div class="location-name">厨房</div>
                        <div class="location-example">水槽/地面</div>
                    </div>
                    <div class="location-item">
                        <div class="location-icon">☀️</div>
                        <div class="location-name">阳台</div>
                        <div class="location-example">洗衣区/窗户</div>
                    </div>
                    <div class="location-item">
                        <div class="location-icon">🏠</div>
                        <div class="location-name">屋顶</div>
                        <div class="location-example">天台/瓦面</div>
                    </div>
                    <div class="location-item">
                        <div class="location-icon">🏢</div>
                        <div class="location-name">外墙</div>
                        <div class="location-example">墙面/窗框</div>
                    </div>
                    <div class="location-item">
                        <div class="location-icon">🪟</div>
                        <div class="location-name">飘窗</div>
                        <div class="location-example">窗台/周边</div>
                    </div>
                    <div class="location-item">
                        <div class="location-icon">📦</div>
                        <div class="location-name">地下室</div>
                        <div class="location-example">地面/墙面</div>
                    </div>
                    <div class="location-item">
                        <div class="location-icon">❓</div>
                        <div class="location-name">其他</div>
                        <div class="location-example">自定义描述</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="bottom-area">
            <button class="btn">下一步</button>
        </div>
    </div>
</body>
</html>
