<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>防水智能报价 v4.0 - 提交成功</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; background: #F8F9FC; }
        .phone-frame { width: 375px; height: 812px; margin: 0 auto; background: #F8F9FC; }
        .success-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 40px 20px; text-align: center; }
        .success-icon { width: 96px; height: 96px; background: linear-gradient(135deg, #10B981, #34D399); border-radius: 48px; display: flex; align-items: center; justify-content: center; font-size: 56px; margin-bottom: 24px; }
        .success-title { font-size: 24px; font-weight: 600; color: #1F2937; margin-bottom: 12px; }
        .success-subtitle { font-size: 15px; color: #6B7280; margin-bottom: 32px; }
        .order-card { background: white; border-radius: 16px; padding: 24px; width: 100%; margin-bottom: 24px; }
        .order-row { display: flex; justify-content: space-between; margin-bottom: 16px; }
        .order-row:last-child { margin-bottom: 0; }
        .order-label { font-size: 14px; color: #9CA3AF; }
        .order-value { font-size: 15px; color: #1F2937; font-weight: 500; }
        .order-value.highlight { color: #1E40AF; font-weight: 600; font-size: 18px; }
        .contact-card { background: #EFF6FF; border-radius: 16px; padding: 20px; width: 100%; margin-bottom: 32px; }
        .contact-title { font-size: 15px; font-weight: 600; color: #1E40AF; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .contact-info { font-size: 14px; color: #6B7280; line-height: 1.6; }
        .btn-primary { width: 100%; height: 52px; background: linear-gradient(135deg, #1E40AF, #3B82F6); border: none; border-radius: 14px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 16px; }
        .btn-secondary { width: 100%; height: 52px; background: white; border: 1px solid #E5E7EB; border-radius: 14px; color: #6B7280; font-size: 16px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="success-container">
            <div class="success-icon">✓</div>
            <div class="success-title">提交成功！</div>
            <div class="success-subtitle">我们的师傅会尽快联系您</div>
            
            <div class="order-card">
                <div class="order-row">
                    <span class="order-label">订单号</span>
                    <span class="order-value highlight">FW202603090001</span>
                </div>
                <div class="order-row">
                    <span class="order-label">服务项目</span>
                    <span class="order-value">卫生间防水补漏</span>
                </div>
                <div class="order-row">
                    <span class="order-label">预估价格</span>
                    <span class="order-value">¥880 起</span>
                </div>
            </div>
            
            <div class="contact-card">
                <div class="contact-title">📞 联系方式</div>
                <div class="contact-info">
                    客服将在 30 分钟内致电确认<br>
                    如有疑问请拨打：400-888-8888
                </div>
            </div>
            
            <button class="btn-primary">查看订单进度</button>
            <button class="btn-secondary">返回首页</button>
        </div>
    </div>
</body>
</html>
