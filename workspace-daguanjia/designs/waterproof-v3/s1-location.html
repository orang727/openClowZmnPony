<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S1 漏点位置选择 - 防水智能报价 v3.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px;
        }
        .screen {
            width: 375px;
            height: 812px;
            background: #F8F9FC;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 8px solid #2a2a3e;
        }
        .header {
            background: linear-gradient(135deg, #1E40AF, #3B82F6);
            height: 140px;
            padding: 52px 16px 16px;
            position: relative;
        }
        .back-btn {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.2);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            position: absolute;
            left: 16px;
            top: 52px;
        }
        .header h1 {
            color: white;
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            margin-top: 8px;
        }
        .header p {
            color: rgba(255,255,255,0.9);
            font-size: 13px;
            text-align: center;
            margin-top: 4px;
        }
        .progress {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: white;
        }
        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .step-dot {
            width: 26px;
            height: 26px;
            border-radius: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
        }
        .step-dot.active { background: #1E40AF; color: white; }
        .step-dot.pending { background: #E5E7EB; color: #9CA3AF; }
        .step-label { font-size: 10px; font-weight: 500; }
        .step-label.active { color: #1E40AF; }
        .step-label.pending { color: #9CA3AF; }
        .content { padding: 20px 16px; }
        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #1F2937;
            margin-bottom: 16px;
        }
        .location-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        .location-card {
            background: white;
            border: 2px solid #E5E7EB;
            border-radius: 14px;
            padding: 12px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .location-card.selected {
            background: #DBEAFE;
            border-color: #3B82F6;
        }
        .location-icon { font-size: 32px; }
        .location-name {
            font-size: 13px;
            font-weight: 500;
            color: #374151;
            text-align: center;
        }
        .location-ex {
            font-size: 11px;
            color: #9CA3AF;
            text-align: center;
        }
        .btn {
            background: linear-gradient(135deg, #1E40AF, #3B82F6);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="screen">
        <div class="header">
            <div class="back-btn">←</div>
            <h1>选择漏点位置</h1>
            <p>请选择需要防水补漏的区域</p>
        </div>
        <div class="progress">
            <div class="step"><div class="step-dot active">1</div><span class="step-label active">位置</span></div>
            <div class="step"><div class="step-dot pending">2</div><span class="step-label pending">上传</span></div>
            <div class="step"><div class="step-dot pending">3</div><span class="step-label pending">分析</span></div>
            <div class="step"><div class="step-dot pending">4</div><span class="step-label pending">方案</span></div>
            <div class="step"><div class="step-dot pending">5</div><span class="step-label pending">价格</span></div>
            <div class="step"><div class="step-dot pending">6</div><span class="step-label pending">下单</span></div>
        </div>
        <div class="content">
            <div class="card">
                <div class="card-title">📍 漏点位置</div>
                <div class="location-grid">
                    <div class="location-card selected"><span class="location-icon">🚿</span><span class="location-name">卫生间</span><span class="location-ex">淋浴区/马桶</span></div>
                    <div class="location-card"><span class="location-icon">🍳</span><span class="location-name">厨房</span><span class="location-ex">水槽/地面</span></div>
                    <div class="location-card"><span class="location-icon">☀️</span><span class="location-name">阳台</span><span class="location-ex">洗衣区/窗户</span></div>
                    <div class="location-card"><span class="location-icon">🏠</span><span class="location-name">屋顶</span><span class="location-ex">天台/瓦面</span></div>
                    <div class="location-card"><span class="location-icon">🏢</span><span class="location-name">外墙</span><span class="location-ex">墙面/窗框</span></div>
                    <div class="location-card"><span class="location-icon">🪟</span><span class="location-name">飘窗</span><span class="location-ex">窗台/周边</span></div>
                    <div class="location-card"><span class="location-icon">🏗️</span><span class="location-name">地下室</span><span class="location-ex">地面/墙面</span></div>
                    <div class="location-card"><span class="location-icon">🔧</span><span class="location-name">管道</span><span class="location-ex">水管/接口</span></div>
                </div>
            </div>
            <button class="btn">下一步</button>
        </div>
    </div>
</body>
</html>
